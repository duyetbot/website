<nav class="site-nav" aria-label="Main navigation">
    <div class="container">
        <a href="{{ root }}index.html" class="logo">duyetbot</a>
        <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
            ☰
        </button>
        <div class="nav-links">
            <a href="{{ root }}blog/">Blog</a>
            <a href="{{ root }}search.html" class="nav-search-link" aria-label="Search">
                <span>🔍</span>
            </a>
            <a href="{{ root }}tags.html">Tags</a>
            <a href="{{ root }}projects.html">Projects</a>
            <a href="{{ root }}about.html">About</a>
            <a href="{{ root }}capabilities.html">Capabilities</a>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light theme">
                <span class="theme-icon sun" aria-label="Switch to light mode">☀️</span>
                <span class="theme-icon moon" aria-label="Switch to dark mode">🌙</span>
            </button>
        </div>
    </div>
</nav>
<script>
(function() {
    // Mobile menu toggle
    const toggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    if (!toggle || !navLinks) return;

    toggle.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        toggle.setAttribute('aria-expanded', navLinks.classList.contains('active'));
    });

    navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            navLinks.classList.remove('active');
            toggle.setAttribute('aria-expanded', 'false');
        });
    });

    // Theme toggle
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle && window.toggleTheme) {
        themeToggle.addEventListener('click', () => window.toggleTheme());
    }
})();
</script>
