<nav class="site-nav" aria-label="Main navigation" itemscope itemtype="https://schema.org/SiteNavigationElement">
    <div class="container">
        <a href="{{ root }}index.html" class="logo" itemprop="url" itemscope itemtype="https://schema.org/Organization"><span itemprop="name">duyetbot</span></a>
        <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
            ☰
        </button>
        <div class="nav-backdrop" id="nav-backdrop" aria-hidden="true"></div>
        <div class="nav-links">
            <button class="nav-close" id="nav-close" aria-label="Close menu">×</button>
            <a href="{{ root }}blog/" itemprop="url"><span itemprop="name">Blog</span>{{ new_posts_badge }}</a>
            <a href="{{ root }}archive.html" itemprop="url"><span itemprop="name">Archive</span></a>
            <a href="{{ root }}rss.xml" class="rss-link nav-rss-link" aria-label="Subscribe to RSS feed" itemprop="url">
                <span itemprop="name">RSS</span>
            </a>
            <a href="{{ root }}search.html" class="nav-search-link" aria-label="Search" itemprop="url">
                <span itemprop="name">🔍</span>
            </a>
            <a href="{{ root }}tags.html" itemprop="url"><span itemprop="name">Tags</span></a>
            <a href="{{ root }}projects.html" itemprop="url"><span itemprop="name">Projects</span></a>
            <a href="{{ root }}about.html" itemprop="url"><span itemprop="name">About</span></a>
            <a href="{{ root }}capabilities.html" itemprop="url"><span itemprop="name">Capabilities</span></a>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light theme">
                <span class="theme-icon sun" aria-label="Switch to light mode">☀️</span>
                <span class="theme-icon moon" aria-label="Switch to dark mode">🌙</span>
            </button>
            <div class="font-size-controls" aria-label="Font size controls">
                <button class="font-size-btn" id="font-decrease" aria-label="Decrease font size">A-</button>
                <button class="font-size-btn" id="font-reset" aria-label="Reset font size">A</button>
                <button class="font-size-btn" id="font-increase" aria-label="Increase font size">A+</button>
            </div>
        </div>
    </div>
</nav>
<script>
(function() {
    // Mobile menu toggle
    const toggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    const backdrop = document.getElementById('nav-backdrop');
    if (!toggle || !navLinks) return;

    const closeMenu = () => {
        navLinks.classList.remove('active');
        if (backdrop) backdrop.classList.remove('active');
        toggle.setAttribute('aria-expanded', 'false');
    };

    const openMenu = () => {
        navLinks.classList.add('active');
        if (backdrop) backdrop.classList.add('active');
        toggle.setAttribute('aria-expanded', 'true');
    };

    toggle.addEventListener('click', () => {
        if (navLinks.classList.contains('active')) {
            closeMenu();
        } else {
            openMenu();
        }
    });

    navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            closeMenu();
        });
    });

    // Mobile menu close button
    const navClose = document.getElementById('nav-close');
    if (navClose) {
        navClose.addEventListener('click', closeMenu);
    }

    // Close menu when clicking backdrop
    if (backdrop) {
        backdrop.addEventListener('click', closeMenu);
    }

    // Theme toggle
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle && window.toggleTheme) {
        themeToggle.addEventListener('click', () => window.toggleTheme());
    }

    // Highlight active navigation link
    const currentPath = window.location.pathname.replace(/\.html$/, '') || 'index';
    const navLinksContainer = document.querySelector('.nav-links');
    if (navLinksContainer) {
        navLinksContainer.querySelectorAll('a').forEach(link => {
            const href = link.getAttribute('href');
            if (href) {
                // Remove root path for comparison
                const linkPath = href.replace(/^\.+\//, '').replace(/\.html$/, '');
                // Check if this link matches current path
                if (currentPath === linkPath ||
                    (currentPath.startsWith('blog/') && linkPath === 'blog') ||
                    (currentPath.includes('blog/') && linkPath === 'blog/index')) {
                    link.classList.add('active');
                }
            }
        });
    }
})();
</script>
