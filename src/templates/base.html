{{ prism }}

    <script>
    (function() {
        const THEMES = { DARK: 'dark', LIGHT: 'light' };
        const DEFAULT_THEME = THEMES.DARK;
        const html = document.documentElement;
        const metaColorScheme = document.querySelector('meta[name="color-scheme"]');

        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            metaColorScheme.content = theme;
        }

        const savedTheme = localStorage.getItem('theme') || DEFAULT_THEME;
        applyTheme(savedTheme);

        function toggleTheme() {
            const currentTheme = html.getAttribute('data-theme') || DEFAULT_THEME;
            const newTheme = currentTheme === THEMES.DARK ? THEMES.LIGHT : THEMES.DARK;
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        }

        window.toggleTheme = toggleTheme;

        // Global keyboard shortcut: "/" to open search
        document.addEventListener('keydown', (e) => {
            // Only trigger if not typing in an input/textarea
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
                return;
            }
            if (e.key === '/' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                e.preventDefault();
                window.location.href = '/search.html';
            }
        });
    })();
    </script>
</head>

<button id="back-to-top" class="back-to-top" aria-label="Back to top" tabindex="-1">
    <span aria-hidden="true">↑</span>
</button>

<script>
(function() {
    const backToTop = document.getElementById('back-to-top');
    const SHOW_THRESHOLD = 400;

    function toggleBackToTop() {
        const isVisible = window.scrollY > SHOW_THRESHOLD;
        const wasVisible = backToTop.classList.contains('visible');

        if (isVisible !== wasVisible) {
            backToTop.classList.toggle('visible', isVisible);
            backToTop.tabIndex = isVisible ? 0 : -1;
        }
    }

    backToTop.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Throttle scroll events
    let ticking = false;
    window.addEventListener('scroll', () => {
        if (!ticking) {
            window.requestAnimationFrame(() => {
                toggleBackToTop();
                ticking = false;
            });
            ticking = true;
        }
    });

    // Initial check
    toggleBackToTop();
})();

// Reading progress indicator (blog posts only)
(function() {
    const progressBar = document.querySelector('.reading-progress-bar');
    if (!progressBar) return;

    // Only show progress on blog posts
    const isBlogPost = /\/blog\/\d{4}-\d{2}-\d{2}/.test(window.location.pathname);
    if (!isBlogPost) return;

    let docHeight = document.documentElement.scrollHeight - window.innerHeight;

    function updateProgress() {
        const scrollTop = window.scrollY;
        const progress = Math.min(100, Math.max(0, (scrollTop / docHeight) * 100));
        progressBar.style.width = `${progress}%`;
    }

    // Recalculate on resize
    window.addEventListener('resize', () => {
        docHeight = document.documentElement.scrollHeight - window.innerHeight;
        updateProgress();
    });

    // Throttled scroll handler
    let ticking = false;
    window.addEventListener('scroll', () => {
        if (!ticking) {
            window.requestAnimationFrame(() => {
                updateProgress();
                ticking = false;
            });
            ticking = true;
        }
    });

    // Initial update
    updateProgress();
})();

// Code copy button functionality
(function() {
    const COPY_TIMEOUT_MS = 2000;

    document.addEventListener('click', (e) => {
        const copyBtn = e.target.closest('.code-copy-btn');
        if (!copyBtn) return;

        const code = copyBtn.dataset.code;
        if (!code) return;

        const icon = copyBtn.querySelector('.copy-icon');
        if (!icon) return;

        const originalText = icon.textContent;

        navigator.clipboard.writeText(code).then(() => {
            copyBtn.classList.add('copied');
            icon.textContent = 'Copied!';

            setTimeout(() => {
                copyBtn.classList.remove('copied');
                icon.textContent = originalText;
            }, COPY_TIMEOUT_MS);
        }).catch(err => {
            console.error('Failed to copy code:', err);
            icon.textContent = 'Failed';
            setTimeout(() => {
                icon.textContent = originalText;
            }, COPY_TIMEOUT_MS);
        });
    });
})();
</script>

</body>
