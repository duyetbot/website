    <script>
    (function() {
        const THEMES = { DARK: 'dark', LIGHT: 'light' };
        const DEFAULT_THEME = THEMES.DARK;
        const html = document.documentElement;
        const metaColorScheme = document.querySelector('meta[name="color-scheme"]');

        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            metaColorScheme.content = theme;
        }

        const savedTheme = localStorage.getItem('theme') || DEFAULT_THEME;
        applyTheme(savedTheme);

        function toggleTheme() {
            const currentTheme = html.getAttribute('data-theme') || DEFAULT_THEME;
            const newTheme = currentTheme === THEMES.DARK ? THEMES.LIGHT : THEMES.DARK;
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        }

        window.toggleTheme = toggleTheme;

        // Global keyboard shortcut: "/" to open search
        document.addEventListener('keydown', (e) => {
            // Only trigger if not typing in an input/textarea
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
                return;
            }
            if (e.key === '/' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                e.preventDefault();
                window.location.href = '/search.html';
            }
        });
    })();
    </script>

<button id="back-to-top" class="back-to-top" aria-label="Back to top" tabindex="-1">
    <span aria-hidden="true">↑</span>
</button>

<script>
(function() {
    const backToTop = document.getElementById('back-to-top');
    const SHOW_THRESHOLD = 400;

    function toggleBackToTop() {
        const isVisible = window.scrollY > SHOW_THRESHOLD;
        const wasVisible = backToTop.classList.contains('visible');

        if (isVisible !== wasVisible) {
            backToTop.classList.toggle('visible', isVisible);
            backToTop.tabIndex = isVisible ? 0 : -1;
        }
    }

    backToTop.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Throttle scroll events
    let ticking = false;
    window.addEventListener('scroll', () => {
        if (!ticking) {
            window.requestAnimationFrame(() => {
                toggleBackToTop();
                ticking = false;
            });
            ticking = true;
        }
    });

    // Initial check
    toggleBackToTop();
})();

// Reading progress indicator (blog posts only)
(function() {
    const progressBar = document.querySelector('.reading-progress-bar');
    if (!progressBar) return;

    // Only show progress on blog posts
    const isBlogPost = /\/blog\/\d{4}-\d{2}-\d{2}/.test(window.location.pathname);
    if (!isBlogPost) return;

    let docHeight = document.documentElement.scrollHeight - window.innerHeight;

    function updateProgress() {
        const scrollTop = window.scrollY;
        const progress = Math.min(100, Math.max(0, (scrollTop / docHeight) * 100));
        const progressRounded = Math.round(progress);
        progressBar.style.width = `${progress}%`;
        progressBar.dataset.progress = `${progressRounded}%`;
    }

    // Recalculate on resize
    window.addEventListener('resize', () => {
        docHeight = document.documentElement.scrollHeight - window.innerHeight;
        updateProgress();
    });

    // Throttled scroll handler
    let ticking = false;
    window.addEventListener('scroll', () => {
        if (!ticking) {
            window.requestAnimationFrame(() => {
                updateProgress();
                ticking = false;
            });
            ticking = true;
        }
    });

    // Initial update
    updateProgress();
})();

// TOC active section highlighting (blog posts only)
(function() {
    const toc = document.querySelector('.toc');
    if (!toc) return;

    const tocLinks = toc.querySelectorAll('a[href^="#"]');
    if (tocLinks.length === 0) return;

    const headings = Array.from(tocLinks).map(link => {
        const id = link.getAttribute('href').substring(1);
        return document.getElementById(id);
    }).filter(Boolean);

    // Throttled scroll handler for intersection observation
    let ticking = false;
    const observerOptions = {
        rootMargin: '-10% 0px -70% 0px', // Active when heading is near top (below nav)
        threshold: 0
    };

    const observer = new IntersectionObserver((entries) => {
        if (!ticking) {
            window.requestAnimationFrame(() => {
                let activeId = null;

                // Find the first visible heading from top
                for (const entry of entries) {
                    if (entry.isIntersecting) {
                        activeId = entry.target.id;
                        break;
                    }
                }

                // If no intersecting (scrolled past all), use last heading
                if (!activeId && entries.length > 0) {
                    activeId = entries[entries.length - 1].target.id;
                }

                if (activeId) {
                    tocLinks.forEach(link => {
                        link.classList.remove('active');
                        if (link.getAttribute('href') === '#' + activeId) {
                            link.classList.add('active');
                        }
                    });
                }

                ticking = false;
            });
            ticking = true;
        }
    }, observerOptions);

    headings.forEach(heading => observer.observe(heading));
})();

// Code copy and heading link functionality (unified handler)
(function() {
    const COPY_TIMEOUT_MS = 2000;
    const HEADING_COPY_TIMEOUT_MS = 1500;

    // Store active timeouts to clear on rapid clicks (prevents memory leak)
    const activeTimeouts = new WeakMap();

    function clearTimeoutIfExists(element) {
        const existingTimeout = activeTimeouts.get(element);
        if (existingTimeout) {
            clearTimeout(existingTimeout);
        }
    }

    document.addEventListener('click', (e) => {
        // Handle code copy buttons
        const copyBtn = e.target.closest('.code-copy-btn');
        if (copyBtn) {
            const code = copyBtn.dataset.code;
            if (!code) return;

            const icon = copyBtn.querySelector('.copy-icon');
            if (!icon) return;

            const originalText = icon.textContent;

            navigator.clipboard.writeText(code).then(() => {
                copyBtn.classList.add('copied');
                icon.textContent = 'Copied!';

                clearTimeoutIfExists(copyBtn);
                activeTimeouts.set(copyBtn, setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    icon.textContent = originalText;
                }, COPY_TIMEOUT_MS));
            }).catch(err => {
                console.error('Failed to copy code:', err);
                icon.textContent = 'Failed';
                clearTimeoutIfExists(copyBtn);
                activeTimeouts.set(copyBtn, setTimeout(() => {
                    icon.textContent = originalText;
                }, COPY_TIMEOUT_MS));
            });
            return;
        }

        // Handle heading copy links
        const headingLink = e.target.closest('.heading-link');
        if (headingLink) {
            e.preventDefault();

            const slug = headingLink.dataset.slug;
            if (!slug) return;

            const url = window.location.origin + window.location.pathname + '#' + slug;

            navigator.clipboard.writeText(url).then(() => {
                headingLink.classList.add('copied');

                clearTimeoutIfExists(headingLink);
                activeTimeouts.set(headingLink, setTimeout(() => {
                    headingLink.classList.remove('copied');
                }, HEADING_COPY_TIMEOUT_MS));
            }).catch(err => {
                console.error('Failed to copy heading link:', err);
                // Fallback: just navigate to the anchor
                window.location.href = '#' + slug;
            });
        }
    });
})();
</script>
